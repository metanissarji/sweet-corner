<!doctype html>
<html lang="he" dir="rtl" style="background:#fff7ea">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icecream.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff7ea" />
    <meta name="description" content="הפינה המתוקה — גלידות, אייסים, מארזים ופינוקים בטעמים שאהובים על כולם" />
    <title>הפינה המתוקה | טעם של קיץ בכל כפית</title>

    <!-- רקע וספלאש מיידיים — נראים עוד לפני שה-JS נטען, בלי מסך שחור -->
    <style>
      html { background: #fff7ea; }
      body { margin: 0; background: #fff7ea; }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: linear-gradient(180deg, #fff7ea 0%, #fbeed7 100%);
        font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        z-index: 9999;
      }
      #splash .splash-scoop {
        width: 92px;
        height: 92px;
        animation: splashBob 1.1s ease-in-out infinite;
      }
      #splash .splash-scoop img { width: 100%; height: 100%; object-fit: contain; }
      #splash .splash-name {
        font-size: 28px;
        font-weight: 800;
        color: #4a2e1d;
        letter-spacing: 0.5px;
      }
      #splash .splash-name span { color: #e8476b; }
      #splash .splash-dots { display: flex; gap: 7px; }
      #splash .splash-dots i {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #e8476b;
        animation: splashPulse 1s ease-in-out infinite;
      }
      #splash .splash-dots i:nth-child(2) { animation-delay: 0.15s; background: #ffc93c; }
      #splash .splash-dots i:nth-child(3) { animation-delay: 0.3s; background: #bde3f8; }
      @keyframes splashBob {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(-10px) rotate(4deg); }
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(0.7); opacity: 0.5; }
        50% { transform: scale(1.15); opacity: 1; }
      }
    </style>

    <!-- גופנים בטעינה לא-חוסמת — העמוד מצויר מיד וגופן מוחלף כשהוא מוכן -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Secular+One&family=Karantina:wght@400;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Secular+One&family=Karantina:wght@400;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Secular+One&family=Karantina:wght@400;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root">
      <!-- ספלאש רגעי — מוחלף אוטומטית ברגע שהאפליקציה עולה -->
      <div id="splash">
        <div class="splash-scoop"><img src="/images/logo-hero.webp" alt="" /></div>
        <div class="splash-name">הפינה <span>המתוקה</span></div>
        <div class="splash-dots"><i></i><i></i><i></i></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
